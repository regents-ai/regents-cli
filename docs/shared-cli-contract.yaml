version: 1
product: shared-services
x-regent-capability:
  status: beta
  owner: shared-services
  money_path: true
  cli_surface: true
  mobile_surface: false
help:
  story: >
    A Regent identity is a saved Agent account. An Agent account is a wallet plus
    registry address plus token ID. Protected shared commands use
    `regents auth login --audience regent-services`, then `regents identity ensure`,
    then the command.
  output_modes:
    human: Panels, tables, status lines, examples, and next-step hints.
    json: Raw JSON for scripts when `--json` is supported or stdout is not a terminal.
  terminal_constraints:
    - Honor NO_COLOR.
    - Avoid rich formatting for non-TTY output and TERM=dumb.
    - Keep command-level help scoped to the requested command group.
x-regent-chat-room-contract:
  owner: regents-cli
  local_xmtp_authority: CLI owns local XMTP identity, local policy files, and raw XMTP group operations.
  product_room_authority: Product room keys and membership rules stay in Platform, Autolaunch, and Techtree contracts.
  thread_identifier_boundary:
    xmtp_group_commands: conversation_id
    techtree_chatbox_commands: Techtree route selectors webapp and agent
  transport_boundary: CLI xmtp commands manage local XMTP transport. CLI chatbox commands use Techtree product routes or local runtime transport.
command_groups:
  - name: operator
    interface: runtime
    auth_mode: none
    output_envelope: operator-status-envelopes
    commands:
      - init
      - status
      - whoami
      - balance
      - run
      - config read
      - config write
      - create init
      - create wallet
      - agent init
      - agent status
      - agent profile list
      - agent profile show
      - agent harness list
      - gossipsub status
    flags:
      whoami:
        - name: --full
          type: boolean
          required: false
          description: Include the saved Platform account projection when a Platform session is present.
  - name: wallet
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - wallet status
      - wallet setup
  - name: identity
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - identity status
      - identity ensure
      - identity graph
    flags:
      graph:
        - name: --json
          type: boolean
          required: false
          description: Print the current identity graph as JSON for automation.
  - name: auth
    interface: http
    auth_mode: none
    output_envelope: loose-object
    commands:
      - auth login
      - auth status
      - auth logout
    path_templates:
      - /v1/agent/siwa/nonce
      - /v1/agent/siwa/verify
  - name: mcp
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - mcp export hermes
  - name: doctor
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - doctor
      - doctor runtime
      - doctor auth
      - doctor techtree
      - doctor transports
      - doctor xmtp
      - doctor contracts
      - doctor workspace
  - name: ens
    interface: http
    auth_mode: agent-siwa
    auth_audience: platform
    output_envelope: loose-object
    note: Ethereum mainnet only. The Regent ENS name must already be attached to the authenticated agent and already resolve to that wallet. This command only prepares and submits the reverse-name transaction.
    commands:
      - ens set-primary
    path_templates:
      - /api/agent-platform/ens/prepare-primary
  - name: xmtp
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - xmtp init
      - xmtp info
      - xmtp status
      - xmtp resolve
      - xmtp owner add
      - xmtp owner list
      - xmtp owner remove
      - xmtp trusted add
      - xmtp trusted list
      - xmtp trusted remove
      - xmtp policy init
      - xmtp policy show
      - xmtp policy validate
      - xmtp policy edit
      - xmtp doctor
      - xmtp test dm
      - xmtp group create
      - xmtp group add-member
      - xmtp group remove-member
      - xmtp group list
      - xmtp group members
      - xmtp group permissions
      - xmtp group update-permission
      - xmtp group admins
      - xmtp group super-admins
      - xmtp group add-admin
      - xmtp group remove-admin
      - xmtp group add-super-admin
      - xmtp group remove-super-admin
      - xmtp revoke-other-installations
      - xmtp rotate-db-key
      - xmtp rotate-wallet
    rpc_methods:
      - xmtp.status
