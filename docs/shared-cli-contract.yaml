version: 1
product: shared-services
help:
  story: >
    A Regent identity is a saved Agent account. An Agent account is a wallet plus
    registry address plus token ID. Protected shared commands use
    `regents auth login --audience regent-services`, then `regents identity ensure`,
    then the command.
  output_modes:
    human: Panels, tables, status lines, examples, and next-step hints.
    json: Raw JSON for scripts when `--json` is supported or stdout is not a terminal.
  terminal_constraints:
    - Honor NO_COLOR.
    - Avoid rich formatting for non-TTY output and TERM=dumb.
    - Keep command-level help scoped to the requested command group.
command_groups:
  - name: operator
    interface: runtime
    auth_mode: none
    output_envelope: operator-status-envelopes
    commands:
      - init
      - status
      - whoami
      - balance
      - run
      - config read
      - config write
      - create init
      - create wallet
      - agent init
      - agent status
      - agent profile list
      - agent profile show
      - agent harness list
      - gossipsub status
  - name: wallet
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - wallet status
      - wallet setup
  - name: identity
    interface: http
    auth_mode: none
    output_envelope: loose-object
    commands:
      - identity status
      - identity ensure
    path_templates:
      - /v1/identity/status
      - /v1/identity/registration-intents
      - /v1/identity/registration-completions
      - /v1/identity/siwa/nonce
      - /v1/identity/siwa/verify
  - name: auth
    interface: http
    auth_mode: none
    output_envelope: loose-object
    commands:
      - auth login
      - auth status
      - auth logout
    path_templates:
      - /v1/agent/siwa/nonce
      - /v1/agent/siwa/verify
      - /v1/identity/status
      - /v1/identity/siwa/nonce
      - /v1/identity/siwa/verify
  - name: mcp
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - mcp export hermes
  - name: doctor
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - doctor
  - name: regent-staking
    interface: http
    auth_mode: agent-siwa
    auth_audience: regent-services
    output_envelope: regent-staking-envelopes
    help:
      summary: Manage Regent staking for the saved Agent account.
      usage: regents regent-staking <command>
      next_step: Start with `regents regent-staking show`.
    commands:
      - regent-staking show
      - regent-staking account
      - regent-staking stake
      - regent-staking unstake
      - regent-staking claim-usdc
      - regent-staking claim-regent
      - regent-staking claim-and-restake-regent
    path_templates:
      - /v1/agent/regent/staking
      - /v1/agent/regent/staking/account/{address}
      - /v1/agent/regent/staking/stake
      - /v1/agent/regent/staking/unstake
      - /v1/agent/regent/staking/claim-usdc
      - /v1/agent/regent/staking/claim-regent
      - /v1/agent/regent/staking/claim-and-restake-regent
  - name: reports
    interface: http
    auth_mode: agent-siwa
    auth_audience: regent-services
    output_envelope: report-envelopes
    commands:
      - bug
      - security-report
    path_templates:
      - /v1/agent/bug-report
      - /v1/agent/security-report
  - name: ens
    interface: http
    auth_mode: agent-siwa
    auth_audience: platform
    output_envelope: loose-object
    note: Ethereum mainnet only. The Regent ENS name must already be attached to the authenticated agent and already resolve to that wallet. This command only prepares and submits the reverse-name transaction.
    commands:
      - ens set-primary
    path_templates:
      - /api/agent-platform/ens/prepare-primary
  - name: xmtp
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    commands:
      - xmtp init
      - xmtp info
      - xmtp status
      - xmtp resolve
      - xmtp owner add
      - xmtp owner list
      - xmtp owner remove
      - xmtp trusted add
      - xmtp trusted list
      - xmtp trusted remove
      - xmtp policy init
      - xmtp policy show
      - xmtp policy validate
      - xmtp policy edit
      - xmtp doctor
      - xmtp test dm
      - xmtp group create
      - xmtp group add-member
      - xmtp group remove-member
      - xmtp group list
      - xmtp group members
      - xmtp group permissions
      - xmtp group update-permission
      - xmtp group admins
      - xmtp group super-admins
      - xmtp group add-admin
      - xmtp group remove-admin
      - xmtp group add-super-admin
      - xmtp group remove-super-admin
      - xmtp revoke-other-installations
      - xmtp rotate-db-key
      - xmtp rotate-wallet
    rpc_methods:
      - xmtp.status
