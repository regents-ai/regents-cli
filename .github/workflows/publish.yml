name: Publish CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: regents-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: regents-cli

      - name: Check out Techtree contract source
        uses: actions/checkout@v4
        with:
          repository: regents-ai/techtree
          path: techtree
          fetch-depth: 0

      - name: Check out Autolaunch contract source
        uses: actions/checkout@v4
        with:
          repository: regents-ai/autolaunch
          path: autolaunch
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: regents-cli/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/regents-cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ${TAG_VERSION} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check generated OpenAPI files
        run: pnpm check:openapi

      - name: Check CLI contract coverage
        run: pnpm check:cli-contract

      - name: Build workspace
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Check packed CLI contents
        run: pnpm check:pack-cli-contents

      - name: Run packed install smoke
        run: pnpm test:pack-smoke

      - name: Publish package
        working-directory: regents-cli/packages/regents-cli
        run: npm publish --access public --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
